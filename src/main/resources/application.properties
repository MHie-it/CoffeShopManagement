spring.application.name=coffeshopManagement

spring.datasource.url=jdbc:mysql://localhost:3306/coffeshop?createDatabaseIfNotExist=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=change-this-secret-key-to-a-long-random-value-1234567890
app.jwt.expiration-ms=86400000

app.seed.enabled=true

