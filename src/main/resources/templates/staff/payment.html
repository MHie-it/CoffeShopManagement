<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Nhân viên</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="grid grid-2">
          <div class="card">
            <h2 style="margin-top:0">Thanh toán MoMo</h2>
            <div style="display:grid;gap:0.65rem">
              <label class="form-row">
                <span>Chọn đơn cần thanh toán</span>
                <select id="staffMomoOrderSelect"></select>
              </label>
            </div>
            <p id="staffMomoOrderSummary" class="muted" style="margin-top:0.75rem">Chưa chọn đơn.</p>
            <div id="staffMomoQrBox" style="margin:1.5rem auto;max-width:220px;aspect-ratio:1;background:var(--surface-2);border:2px dashed var(--border);border-radius:16px;display:grid;place-items:center;color:var(--muted);font-size:0.9rem;text-align:center;padding:1rem">
              QR MoMo<br>
              <span style="font-size:0.75rem;margin-top:0.35rem;display:block">Bấm "Tạo / làm mới mã"</span>
            </div>
            <button id="staffMomoGenerateBtn" type="button" class="btn btn-primary" style="width:100%">Tạo / làm mới mã</button>
            <p id="staffMomoMessage" class="form-inline-message" style="margin-top:0.75rem" aria-live="polite"></p>
          </div>
          <div class="card">
            <h2 style="margin-top:0">Trạng thái giao dịch</h2>
            <p id="staffMomoStatusBadge" class="badge-role" style="display:inline-block;margin-bottom:1rem;background:rgba(188,108,37,0.15);color:var(--warning)">Chưa tạo mã</p>
            <ul style="margin:0;padding:0;list-style:none;font-size:0.92rem;line-height:1.85;color:var(--muted)">
              <li>Mã tham chiếu: <code id="staffMomoRef" style="background:var(--surface-2);padding:0.1rem 0.35rem;border-radius:4px;font-size:0.8rem">-</code></li>
              <li>Sau khi xác nhận thành công: khóa đơn, in hóa đơn, giải phóng bàn</li>
            </ul>
            <div style="margin-top:1.5rem;display:flex;flex-wrap:wrap;gap:0.5rem">
              <button id="staffMomoCancelBtn" type="button" class="btn btn-ghost">Hủy giao dịch</button>
              <button id="staffMomoConfirmBtn" type="button" class="btn btn-primary">Xác nhận đã nhận tiền (thủ công)</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
