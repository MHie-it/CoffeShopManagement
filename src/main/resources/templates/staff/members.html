<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Nhân viên</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="grid grid-2" style="margin-bottom:1.25rem">
          <div class="card">
            <h2 style="margin-top:0">Tra cứu thành viên</h2>
            <form id="staffMemberSearchForm">
              <div class="form-group">
                <label for="staffMemberPhone">SĐT</label>
                <input id="staffMemberPhone" type="text" placeholder="09xx..." required>
              </div>
              <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
                <button type="submit" class="btn btn-primary">Tìm</button>
                <button id="staffMemberOpenCreateBtn" type="button" class="btn btn-ghost">+ Tạo khách mới</button>
              </div>
            </form>
            <p id="staffMemberMessage" class="form-inline-message" style="margin-top:0.75rem" aria-live="polite"></p>
          </div>
          <div class="card stat-card">
            <div class="label">Khách chọn</div>
            <div id="staffMemberName" class="value" style="font-size:1.35rem">-</div>
            <p class="muted" style="margin-top:0.75rem">Điểm hiện có: <strong id="staffMemberPoints" style="color:var(--ink)">0</strong></p>
            <div style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:0.5rem">
              <button id="staffMemberReloadBtn" type="button" class="btn btn-ghost">Làm mới</button>
              <button id="staffMemberOpenRedeemBtn" type="button" class="btn btn-primary">Đổi voucher</button>
            </div>
          </div>
        </div>
        <div class="grid grid-2">
          <div class="card" style="padding:0;overflow:hidden">
            <div class="table-wrap">
              <table class="data">
                <thead>
                  <tr>
                    <th>Voucher</th>
                    <th>Loại</th>
                    <th>Giá trị</th>
                    <th>Trạng thái</th>
                    <th>Hết hạn</th>
                  </tr>
                </thead>
                <tbody id="staffMemberVouchersBody">
                  <tr><td colspan="5" class="muted">Chưa chọn khách.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="card" style="padding:0;overflow:hidden">
            <div class="table-wrap">
              <table class="data">
                <thead>
                  <tr>
                    <th>Thời gian</th>
                    <th>Điểm</th>
                    <th>Mô tả</th>
                  </tr>
                </thead>
                <tbody id="staffMemberPointsBody">
                  <tr><td colspan="3" class="muted">Chưa chọn khách.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="staffMemberCreateModal" class="modal" hidden>
          <div class="modal-backdrop" data-close-modal></div>
          <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="staffMemberCreateTitle">
            <div class="modal-head">
              <h3 id="staffMemberCreateTitle">Tạo khách hàng thành viên</h3>
              <button type="button" class="modal-close" data-close-modal aria-label="Đóng">×</button>
            </div>
            <form id="staffMemberCreateForm" class="modal-form">
              <label class="form-row">
                <span>Họ tên</span>
                <input id="staffMemberCreateName" maxlength="100" required>
              </label>
              <label class="form-row">
                <span>Số điện thoại</span>
                <input id="staffMemberCreatePhone" maxlength="15" required>
              </label>
              <p id="staffMemberCreateMessage" class="form-inline-message" aria-live="polite"></p>
              <div class="modal-actions">
                <button type="button" class="btn btn-ghost" data-close-modal>Hủy</button>
                <button type="submit" class="btn btn-primary">Tạo khách</button>
              </div>
            </form>
          </div>
        </div>

        <div id="staffMemberRedeemModal" class="modal" hidden>
          <div class="modal-backdrop" data-close-modal></div>
          <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="staffMemberRedeemTitle">
            <div class="modal-head">
              <h3 id="staffMemberRedeemTitle">Đổi voucher</h3>
              <button type="button" class="modal-close" data-close-modal aria-label="Đóng">×</button>
            </div>
            <form id="staffMemberRedeemForm" class="modal-form">
              <label class="form-row">
                <span>Mã voucher</span>
                <input id="staffRedeemCode" maxlength="20" required placeholder="AURORA50K">
              </label>
              <label class="form-row">
                <span>Loại</span>
                <select id="staffRedeemType" required>
                  <option value="fixed">Giảm cố định</option>
                  <option value="percent">Giảm phần trăm</option>
                </select>
              </label>
              <label class="form-row">
                <span>Giá trị</span>
                <input id="staffRedeemValue" type="number" min="0" step="1000" required placeholder="50000">
              </label>
              <label class="form-row">
                <span>Điểm cần đổi</span>
                <input id="staffRedeemPointsRequired" type="number" min="0" step="1" required placeholder="100">
              </label>
              <p id="staffMemberRedeemMessage" class="form-inline-message" aria-live="polite"></p>
              <div class="modal-actions">
                <button type="button" class="btn btn-ghost" data-close-modal>Hủy</button>
                <button type="submit" class="btn btn-primary">Xác nhận đổi</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
