<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Nhân viên</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="grid grid-2">
          <div class="card" style="text-align:center;padding:2.5rem 1.5rem">
            <p class="muted" style="margin:0 0 0.5rem;font-size:0.85rem">Hôm nay</p>
            <p style="font-family:var(--font-display);font-size:2.75rem;font-weight:600;margin:0;letter-spacing:-0.03em">07:42</p>
            <p class="muted" style="margin:0.5rem 0 1.75rem">Check-in dự kiến 07:00</p>
            <button type="button" class="btn btn-primary" style="padding:0.85rem 2rem;font-size:1rem">Chấm vào ca</button>
          </div>
          <div class="card">
            <h2 style="margin-top:0">Lịch sử hôm nay</h2>
            <ul style="margin:0;padding:0;list-style:none;font-size:0.92rem;line-height:1.8;color:var(--muted)">
              <li style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:0.5rem 0">
                <span>Vào ca</span><span style="color:var(--ink);font-weight:600">—</span>
              </li>
              <li style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:0.5rem 0">
                <span>Ra ca</span><span style="color:var(--ink);font-weight:600">—</span>
              </li>
            </ul>
            <p class="muted" style="margin-top:1rem;font-size:0.85rem">Ghi nhận vào <code style="background:var(--surface-2);padding:0.1rem 0.35rem;border-radius:4px">Attendance</code>.</p>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
