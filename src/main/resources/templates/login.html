<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Đăng nhập')}">
  <title>Đăng nhập</title>
</head>

<body class="page-auth">
  <div class="auth-split">
    <div class="auth-visual">
      <div>
        <a th:href="@{/}" style="color:#e8dfd4;font-weight:600;font-size:0.95rem;text-decoration:none">← Aurora Café</a>
        <h2 style="margin-top:2rem">Mỗi ca làm đều có hương vị riêng.</h2>
        <p class="quote">Đăng nhập để vào đúng không gian làm việc: quản trị, quản lý hoặc phục vụ.</p>
      </div>
      <p style="font-size:0.85rem;opacity:0.55">Giao diện demo — tích hợp Spring Security sau.</p>
    </div>
    <div class="auth-panel">
      <div class="auth-box">
        <h1>Đăng nhập</h1>
        <p class="sub">Nhập email và mật khẩu để tiếp tục.</p>
        <form th:action="@{/login}" method="post">
          <div class="form-group">
            <label for="username">Email</label>
            <input id="username" name="username" type="email" autocomplete="username" placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary">Đăng nhập</button>
        </form>
        <p style="margin-top:1.25rem;font-size:0.88rem;color:var(--muted)">
          Chưa có xác thực phía server? Dùng
          <a th:href="@{/}">trang chủ</a> để vào từng khu vực demo.
        </p>
      </div>
    </div>
  </div>
</body>

</html>
