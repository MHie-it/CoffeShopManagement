<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Quản lý</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="grid grid-3" style="margin-bottom:1.25rem">
          <div class="card stat-card">
            <div class="label">Tổng giờ tháng</div>
            <div class="value">1.248h</div>
            <div class="delta">Toàn quán (demo)</div>
          </div>
          <div class="card stat-card">
            <div class="label">Đi muộn</div>
            <div class="value">6</div>
            <div class="delta" style="color:var(--warning)">Cần xem xét</div>
          </div>
          <div class="card stat-card">
            <div class="label">Vắng có phép</div>
            <div class="value">2</div>
            <div class="delta">Tháng 3</div>
          </div>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>Nhân viên</th>
                  <th>Ngày</th>
                  <th>Vào</th>
                  <th>Ra</th>
                  <th>Giờ làm</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Lê An</td>
                  <td>22/03/2025</td>
                  <td>07:02</td>
                  <td>15:10</td>
                  <td>8h 08p</td>
                </tr>
                <tr>
                  <td>Phạm Hải</td>
                  <td>22/03/2025</td>
                  <td>14:55</td>
                  <td>22:03</td>
                  <td>7h 08p</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <p class="muted" style="margin-top:1rem;font-size:0.88rem">Nguồn: entity <code style="background:var(--surface-2);padding:0.1rem 0.35rem;border-radius:4px">Attendance</code>.</p>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
