<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Quản lý</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="grid grid-2" style="margin-bottom:1.25rem">
          <div class="card" style="border-left:4px solid var(--warning)">
            <h3 style="margin:0 0 0.5rem;font-family:var(--font-display)">Cảnh báo tồn kho</h3>
            <p id="lowStockSummary" class="muted" style="margin:0">Đang tải dữ liệu tồn kho...</p>
          </div>
          <div class="card" style="display:flex;align-items:center;justify-content:flex-end;gap:0.5rem">
            <button type="button" class="btn btn-ghost" data-open-modal="ingredientCreateModal">+ Nguyên liệu</button>
            <button type="button" class="btn btn-ghost" data-open-modal="inventoryHistoryModal">Lịch sử nhập</button>
            <button type="button" class="btn btn-primary" data-open-modal="inventoryReceiptModal">+ Phiếu nhập</button>
          </div>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>Nguyên liệu</th>
                  <th>Đơn vị</th>
                  <th>Tồn</th>
                  <th>Ngưỡng</th>
                  <th>Trạng thái</th>
                </tr>
              </thead>
              <tbody id="inventoryTableBody">
                <tr>
                  <td colspan="5" class="muted">Đang tải danh sách nguyên liệu...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div id="inventoryReceiptModal" class="modal" hidden>
          <div class="modal-backdrop" data-close-modal></div>
          <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="inventoryReceiptTitle">
            <div class="modal-head">
              <h3 id="inventoryReceiptTitle">Tạo phiếu nhập/xuất kho</h3>
              <button type="button" class="modal-close" data-close-modal aria-label="Đóng">×</button>
            </div>
            <form id="inventoryReceiptForm" class="modal-form" data-inventory-receipt-form>
              <label class="form-row">
                <span>Nguyên liệu</span>
                <select id="receiptIngredient" required></select>
              </label>
              <label class="form-row">
                <span>Loại phiếu</span>
                <select id="receiptType" required>
                  <option value="import_">Nhập kho</option>
                  <option value="export">Xuất kho</option>
                  <option value="adjust">Điều chỉnh</option>
                </select>
              </label>
              <label class="form-row">
                <span>Số lượng</span>
                <input id="receiptQuantity" type="number" step="0.01" min="0.01" required placeholder="Ví dụ: 5" />
              </label>
              <label class="form-row">
                <span>Ghi chú</span>
                <input id="receiptNote" type="text" maxlength="255" placeholder="NCC, lô hàng, lý do điều chỉnh..." />
              </label>
              <p id="inventoryReceiptMessage" class="form-inline-message" aria-live="polite"></p>
              <div class="modal-actions">
                <button type="button" class="btn btn-ghost" data-close-modal>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu phiếu</button>
              </div>
            </form>
          </div>
        </div>

        <div id="ingredientCreateModal" class="modal" hidden>
          <div class="modal-backdrop" data-close-modal></div>
          <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="ingredientCreateTitle">
            <div class="modal-head">
              <h3 id="ingredientCreateTitle">Thêm nguyên liệu mới</h3>
              <button type="button" class="modal-close" data-close-modal aria-label="Đóng">×</button>
            </div>
            <form id="ingredientCreateForm" class="modal-form">
              <label class="form-row">
                <span>Tên nguyên liệu</span>
                <input id="ingredientName" maxlength="100" required placeholder="Hạt cà phê Arabica" />
              </label>
              <label class="form-row">
                <span>Đơn vị</span>
                <input id="ingredientUnit" maxlength="20" required placeholder="kg / lít / chai" />
              </label>
              <label class="form-row">
                <span>Tồn ban đầu</span>
                <input id="ingredientStockQuantity" type="number" min="0" step="0.01" required placeholder="10" />
              </label>
              <label class="form-row">
                <span>Ngưỡng tối thiểu</span>
                <input id="ingredientMinThreshold" type="number" min="0" step="0.01" required placeholder="2" />
              </label>
              <p id="ingredientCreateMessage" class="form-inline-message" aria-live="polite"></p>
              <div class="modal-actions">
                <button type="button" class="btn btn-ghost" data-close-modal>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu nguyên liệu</button>
              </div>
            </form>
          </div>
        </div>

        <div id="inventoryHistoryModal" class="modal" hidden>
          <div class="modal-backdrop" data-close-modal></div>
          <div class="modal-panel modal-panel-lg" role="dialog" aria-modal="true" aria-labelledby="inventoryHistoryTitle">
            <div class="modal-head">
              <h3 id="inventoryHistoryTitle">Lịch sử kho</h3>
              <button type="button" class="modal-close" data-close-modal aria-label="Đóng">×</button>
            </div>
            <div class="table-wrap">
              <table class="data">
                <thead>
                  <tr>
                    <th>Thời gian</th>
                    <th>Nguyên liệu</th>
                    <th>Loại</th>
                    <th>Số lượng</th>
                    <th>Người tạo</th>
                    <th>Ghi chú</th>
                  </tr>
                </thead>
                <tbody id="inventoryHistoryBody">
                  <tr>
                    <td colspan="6" class="muted">Chưa có dữ liệu.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js(v=${#dates.createNow().time})}"></script>
</body>

</html>
