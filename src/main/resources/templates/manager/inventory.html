<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Quản lý</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="grid grid-2" style="margin-bottom:1.25rem">
          <div class="card" style="border-left:4px solid var(--warning)">
            <h3 style="margin:0 0 0.5rem;font-family:var(--font-display)">Cảnh báo tồn kho</h3>
            <p class="muted" style="margin:0">Sữa tươi, Syrup vanilla dưới ngưỡng tối thiểu.</p>
          </div>
          <div class="card" style="display:flex;align-items:center;justify-content:flex-end;gap:0.5rem">
            <button type="button" class="btn btn-ghost">Lịch sử nhập</button>
            <button type="button" class="btn btn-primary">+ Phiếu nhập</button>
          </div>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>Nguyên liệu</th>
                  <th>Đơn vị</th>
                  <th>Tồn</th>
                  <th>Ngưỡng</th>
                  <th>Trạng thái</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Cà phê hạt Arabica</td>
                  <td>kg</td>
                  <td>8,2</td>
                  <td>5</td>
                  <td style="color:var(--success);font-weight:600">Ổn định</td>
                </tr>
                <tr>
                  <td>Sữa tươi</td>
                  <td>l</td>
                  <td>3,1</td>
                  <td>5</td>
                  <td style="color:var(--warning);font-weight:600">Sắp hết</td>
                </tr>
                <tr>
                  <td>Syrup vanilla</td>
                  <td>chai</td>
                  <td>1</td>
                  <td>2</td>
                  <td style="color:var(--danger);font-weight:600">Cần nhập</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
