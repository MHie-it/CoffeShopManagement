<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Quản lý</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="card" style="margin-bottom:1.25rem;display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:space-between;align-items:center">
          <p class="muted" style="margin:0">Hồ sơ, lương, ca làm nhân viên.</p>
          <button type="button" class="btn btn-primary" data-open-modal="employeeCreateModal">+ Nhân viên</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>Nhân viên</th>
                  <th>SĐT</th>
                  <th>Ca chính</th>
                  <th>Lương cơ bản</th>
                  <th>Trạng thái</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="employeeTableBody">
                <tr>
                  <td colspan="5" class="muted">Đang tải danh sách nhân viên...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div id="employeeCreateModal" class="modal" hidden>
          <div class="modal-backdrop" data-close-modal></div>
          <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="employeeCreateTitle">
            <div class="modal-head">
              <h3 id="employeeCreateTitle">Thêm nhân viên mới</h3>
              <button type="button" class="modal-close" data-close-modal aria-label="Đóng">×</button>
            </div>
            <form id="employeeCreateForm" class="modal-form">
              <label class="form-row">
                <span>Họ tên</span>
                <input id="employeeFullName" required maxlength="100" />
              </label>
              <label class="form-row">
                <span>Số điện thoại</span>
                <input id="employeePhone" required maxlength="15" placeholder="09xxxxxxxx" />
              </label>
              <label class="form-row">
                <span>Vị trí</span>
                <input id="employeePosition" maxlength="50" placeholder="Barista / Thu ngân" />
              </label>
              <label class="form-row">
                <span>Mã ca</span>
                <input id="employeeShiftCode" maxlength="20" placeholder="MORNING / EVENING" />
              </label>
              <label class="form-row">
                <span>Lương giờ</span>
                <input id="employeeHourlyRate" type="number" min="0" step="1000" placeholder="25000" />
              </label>
              <p id="employeeCreateMessage" class="form-inline-message" aria-live="polite"></p>
              <div class="modal-actions">
                <button type="button" class="btn btn-ghost" data-close-modal>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu nhân viên</button>
              </div>
            </form>
          </div>
        </div>

        <div id="employeeUpdateModal" class="modal" hidden>
          <div class="modal-backdrop" data-close-modal></div>
          <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="employeeUpdateTitle">
            <div class="modal-head">
              <h3 id="employeeUpdateTitle">Cập nhật nhân viên</h3>
              <button type="button" class="modal-close" data-close-modal aria-label="Đóng">×</button>
            </div>
            <form id="employeeUpdateForm" class="modal-form">
              <input id="employeeUpdateId" type="hidden" />
              <label class="form-row">
                <span>Họ tên</span>
                <input id="employeeUpdateFullName" maxlength="100" />
              </label>
              <label class="form-row">
                <span>Số điện thoại</span>
                <input id="employeeUpdatePhone" maxlength="15" />
              </label>
              <label class="form-row">
                <span>Vị trí</span>
                <input id="employeeUpdatePosition" maxlength="50" />
              </label>
              <label class="form-row">
                <span>Mã ca</span>
                <input id="employeeUpdateShiftCode" maxlength="20" />
              </label>
              <label class="form-row">
                <span>Lương giờ</span>
                <input id="employeeUpdateHourlyRate" type="number" min="0" step="1000" />
              </label>
              <label class="form-row">
                <span>Trạng thái</span>
                <select id="employeeUpdateIsActive">
                  <option value="true">Đang hoạt động</option>
                  <option value="false">Ngừng hoạt động</option>
                </select>
              </label>
              <p id="employeeUpdateMessage" class="form-inline-message" aria-live="polite"></p>
              <div class="modal-actions">
                <button type="button" class="btn btn-ghost" data-close-modal>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu cập nhật</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
