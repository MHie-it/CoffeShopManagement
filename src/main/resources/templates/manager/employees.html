<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Quản lý</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="card" style="margin-bottom:1.25rem;display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:space-between;align-items:center">
          <p class="muted" style="margin:0">Hồ sơ, lương, ca làm — bảng demo.</p>
          <button type="button" class="btn btn-primary">+ Nhân viên</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>Nhân viên</th>
                  <th>SĐT</th>
                  <th>Ca chính</th>
                  <th>Lương cơ bản</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Lê An</td>
                  <td>0901…</td>
                  <td>Sáng (7–15h)</td>
                  <td>8.000.000 ₫</td>
                  <td><a href="#">Chi tiết</a></td>
                </tr>
                <tr>
                  <td>Phạm Hải</td>
                  <td>0902…</td>
                  <td>Chiều (14–22h)</td>
                  <td>7.500.000 ₫</td>
                  <td><a href="#">Chi tiết</a></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
