<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}">
  <title>Admin</title>
</head>

<body>
  <div class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${role}, ${navActive})}"></aside>
    <div class="main-wrap">
      <header th:replace="~{fragments/topbar :: topbar(${roleLabel})}"></header>
      <main class="content">
        <div class="card" style="margin-bottom:1.25rem">
          <form id="adminAuditFilterForm" style="display:grid;gap:0.75rem">
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:0.75rem">
              <label class="form-row">
                <span>Từ ngày</span>
                <input id="adminAuditFromDate" type="date">
              </label>
              <label class="form-row">
                <span>Đến ngày</span>
                <input id="adminAuditToDate" type="date">
              </label>
              <label class="form-row">
                <span>Hành động</span>
                <input id="adminAuditAction" maxlength="100" placeholder="LOGIN, EMPLOYEE_UPDATE...">
              </label>
              <label class="form-row">
                <span>Username</span>
                <input id="adminAuditUsername" maxlength="50" placeholder="admin">
              </label>
            </div>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
              <button type="submit" class="btn btn-primary">Lọc</button>
              <button id="adminAuditClearBtn" type="button" class="btn btn-ghost">Xóa bộ lọc</button>
            </div>
            <p id="adminAuditMessage" class="form-inline-message" aria-live="polite"></p>
          </form>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Người dùng</th>
                  <th>Hành động</th>
                  <th>Bảng</th>
                  <th>Chi tiết</th>
                </tr>
              </thead>
              <tbody id="adminAuditBody">
                <tr><td colspan="5" class="muted">Đang tải nhật ký...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
